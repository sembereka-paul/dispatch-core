name: CI
env:
  IMAGE_NAME_PREFIX: ${{ github.event.repository.name }}

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Do deps
        run: |
          set -xeuo pipefail
          go work sync
          cd proto && go mod tidy && cd ..
          cd api && go mod tidy && cd ..
          cd pub-sub && go mod tidy

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "33.x"

      - name: Install protoc-gen-go 
        run: | 
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          export PATH="$PATH:$(go env GOPATH)/bin"

      - run: task test

  api-build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.IMAGE_NAME_PREFIX }}-api
          tags: |
            type=ref,event=branch
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api.Dockerfile
          push: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  pub-sub-build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.IMAGE_NAME_PREFIX }}-pub-sub
          tags: |
            type=ref,event=branch
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: pub-sub.Dockerfile
          push: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
